<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);}
  .wrap{padding:20px 24px;box-sizing:border-box;width:100%;min-height:100%;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{width:88px;height:56px;border-radius:6px;border:1px solid var(--color-rule);display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .swatch.lt{color:#111;text-shadow:none;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-lt);margin-bottom:10px;}
  .mini{font-family:var(--font-mono);font-size:11px;color:var(--color-text-mid);}
  .typespec{display:flex;align-items:baseline;gap:14px;}
  .typespec .meta{font-family:var(--font-mono);font-size:10px;color:var(--color-text-lt);letter-spacing:.08em;text-transform:uppercase;flex:none;}
</style></head><body><div class="wrap">
    <div class="lbl">Brand purple · single-accent scale · anchor #4f3d78 at 700</div>
    <div class="row">
      <div class="swatch lt" style="background:#f5f3ff">50</div><div class="swatch lt" style="background:#ede9fe">100</div><div class="swatch lt" style="background:#ddd6fe">200</div><div class="swatch lt" style="background:#c4b5fd">300</div><div class="swatch" style="background:#a78bdb">400</div><div class="swatch" style="background:#8b6fc0">500</div><div class="swatch" style="background:#6d4ea3">600</div><div class="swatch" style="background:#4f3d78">700</div><div class="swatch" style="background:#3d2e62">800</div><div class="swatch" style="background:#2e224a">900</div><div class="swatch" style="background:#1a1333">950</div>
    </div>
    <div class="mini" style="margin-top:14px;">Light-mode links &amp; accents: <b style="color:#4f3d78">700</b> · Dark-mode: <b style="color:#a78bdb">400</b> · Hover pairs: 800 / 300</div></div></body></html>
