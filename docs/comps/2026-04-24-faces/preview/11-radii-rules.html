<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);}
  .wrap{padding:20px 24px;box-sizing:border-box;width:100%;min-height:100%;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{width:88px;height:56px;border-radius:6px;border:1px solid var(--color-rule);display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .swatch.lt{color:#111;text-shadow:none;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-lt);margin-bottom:10px;}
  .mini{font-family:var(--font-mono);font-size:11px;color:var(--color-text-mid);}
  .typespec{display:flex;align-items:baseline;gap:14px;}
  .typespec .meta{font-family:var(--font-mono);font-size:10px;color:var(--color-text-lt);letter-spacing:.08em;text-transform:uppercase;flex:none;}
</style></head><body><div class="wrap">
    <div class="lbl">Radii · hairline / card / pill · no shadows</div>
    <div style="display:flex;gap:18px;align-items:center;margin:8px 0 12px;">
      <div style="width:70px;height:46px;border:1px solid #4f3d78;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#4f3d78;">2PX</div>
      <div style="width:70px;height:46px;background:#f2f1f4;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;">12PX</div>
      <div style="height:32px;padding:0 18px;background:#4f3d78;color:#fafafa;border-radius:9999px;display:flex;align-items:center;font-family:var(--font-body);font-size:13px;">PILL</div>
    </div>
    <div class="mini">Hairline: focus rings, thin chrome · Card: dark-card containers · Pill: buttons, toggles, tags</div></div></body></html>
