<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);}
  .wrap{padding:20px 24px;box-sizing:border-box;width:100%;min-height:100%;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{width:88px;height:56px;border-radius:6px;border:1px solid var(--color-rule);display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .swatch.lt{color:#111;text-shadow:none;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-lt);margin-bottom:10px;}
  .mini{font-family:var(--font-mono);font-size:11px;color:var(--color-text-mid);}
  .typespec{display:flex;align-items:baseline;gap:14px;}
  .typespec .meta{font-family:var(--font-mono);font-size:10px;color:var(--color-text-lt);letter-spacing:.08em;text-transform:uppercase;flex:none;}
</style></head><body><div class="wrap">
    <div class="lbl">Revision stamp + breadcrumb · Plex Mono chrome</div>
    <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#6e6e6e;margin:10px 0;">
      <span style="color:#6e6e6e;">Home</span>
      <span style="color:#ddd;margin:0 .6em;">/</span>
      <span style="color:#6e6e6e;">Writing</span>
      <span style="color:#ddd;margin:0 .6em;">/</span>
      <span style="color:#1a1a1a;">The spreadsheet is not the project</span>
    </div>
    <div style="padding:10px 0;border-top:1px solid #ddd;border-bottom:1px solid #ddd;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#6e6e6e;margin:10px 0;">
      Essay &nbsp;·&nbsp; 2026-03-14 &nbsp;·&nbsp; 8 min read &nbsp;·&nbsp; Rev 2026.04
    </div>
    <div class="mini">Head-of-article meta strip + foot stamp · every page carries one · low-contrast on purpose</div></div></body></html>
