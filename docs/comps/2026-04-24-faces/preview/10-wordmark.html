<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);}
  .wrap{padding:20px 24px;box-sizing:border-box;width:100%;min-height:100%;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{width:88px;height:56px;border-radius:6px;border:1px solid var(--color-rule);display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .swatch.lt{color:#111;text-shadow:none;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-lt);margin-bottom:10px;}
  .mini{font-family:var(--font-mono);font-size:11px;color:var(--color-text-mid);}
  .typespec{display:flex;align-items:baseline;gap:14px;}
  .typespec .meta{font-family:var(--font-mono);font-size:10px;color:var(--color-text-lt);letter-spacing:.08em;text-transform:uppercase;flex:none;}
</style></head><body><div class="wrap">
    <div class="lbl">Wordmark · Plex Mono Medium · +0.14em · leading purple dot</div>
    <div style="display:flex;flex-direction:column;gap:14px;margin:8px 0;">
      <div><span class="wordmark" style="font-size:11px;">CBKDI</span><span class="mini" style="margin-left:12px;">11px · footer chrome</span></div>
      <div><span class="wordmark" style="font-size:13px;">CBKDI</span><span class="mini" style="margin-left:12px;">13px · header default</span></div>
      <div><span class="wordmark" style="font-size:16px;">CBKDI</span><span class="mini" style="margin-left:12px;">16px · standalone mark</span></div>
    </div>
    <div class="mini">Moved from Inter (v0.1) to Plex Mono — wordmark now reads as first chrome element, not competing logotype.</div></div></body></html>
