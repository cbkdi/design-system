<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);}
  .wrap{padding:20px 24px;box-sizing:border-box;width:100%;min-height:100%;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{width:88px;height:56px;border-radius:6px;border:1px solid var(--color-rule);display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .swatch.lt{color:#111;text-shadow:none;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-lt);margin-bottom:10px;}
  .mini{font-family:var(--font-mono);font-size:11px;color:var(--color-text-mid);}
  .typespec{display:flex;align-items:baseline;gap:14px;}
  .typespec .meta{font-family:var(--font-mono);font-size:10px;color:var(--color-text-lt);letter-spacing:.08em;text-transform:uppercase;flex:none;}
</style></head><body><div class="wrap">
    <div class="lbl">Dark mode · warm near-black + inverted neutrals</div>
    <div style="background:#141218;margin:-20px -24px;padding:20px 24px;color:#e5e5e5;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px 30px;">
        <div class="typespec"><span class="meta" style="color:#808080">bg</span><div style="width:60px;height:30px;background:#141218;border:1px solid #2a2a2a;"></div><span class="mini" style="color:#aaa">#141218</span></div>
        <div class="typespec"><span class="meta" style="color:#808080">surface</span><div style="width:60px;height:30px;background:#1f1d24;border:1px solid #2a2a2a;"></div><span class="mini" style="color:#aaa">#1f1d24</span></div>
        <div class="typespec"><span class="meta" style="color:#808080">text</span><div style="width:60px;height:30px;background:#e5e5e5;"></div><span class="mini" style="color:#aaa">#e5e5e5</span></div>
        <div class="typespec"><span class="meta" style="color:#808080">text-mid</span><div style="width:60px;height:30px;background:#aaaaaa;"></div><span class="mini" style="color:#aaa">#aaaaaa</span></div>
        <div class="typespec"><span class="meta" style="color:#808080">primary</span><div style="width:60px;height:30px;background:#a78bdb;"></div><span class="mini" style="color:#aaa">#a78bdb</span></div>
        <div class="typespec"><span class="meta" style="color:#808080">rule</span><div style="width:60px;height:30px;background:#2a2a2a;"></div><span class="mini" style="color:#aaa">#2a2a2a</span></div>
      </div>
    </div></div></body></html>
