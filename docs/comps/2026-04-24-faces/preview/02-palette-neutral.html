<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);}
  .wrap{padding:20px 24px;box-sizing:border-box;width:100%;min-height:100%;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{width:88px;height:56px;border-radius:6px;border:1px solid var(--color-rule);display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .swatch.lt{color:#111;text-shadow:none;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-lt);margin-bottom:10px;}
  .mini{font-family:var(--font-mono);font-size:11px;color:var(--color-text-mid);}
  .typespec{display:flex;align-items:baseline;gap:14px;}
  .typespec .meta{font-family:var(--font-mono);font-size:10px;color:var(--color-text-lt);letter-spacing:.08em;text-transform:uppercase;flex:none;}
</style></head><body><div class="wrap">
    <div class="lbl">Neutrals · text, rules, surfaces</div>
    <div class="row">
      <div class="swatch lt" style="background:#fafafa">50</div><div class="swatch lt" style="background:#f2f1f4">100</div><div class="swatch lt" style="background:#e5e5e5">200</div><div class="swatch lt" style="background:#dddddd">300</div><div class="swatch lt" style="background:#aaaaaa">400</div><div class="swatch" style="background:#808080">500</div><div class="swatch" style="background:#6e6e6e">600</div><div class="swatch" style="background:#4a4a4a">700</div><div class="swatch" style="background:#2a2a2a">800</div><div class="swatch" style="background:#1a1a1a">900</div><div class="swatch" style="background:#141218">950</div>
    </div>
    <div class="mini" style="margin-top:14px;">text 900 · text-mid 700 · text-lt 600 · rule 300 · bg 50 · surface 100</div></div></body></html>
